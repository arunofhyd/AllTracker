<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sheetu's Tide Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            font-family: 'League Spartan', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden;
        }
        
        .calendar-grid { 
            display: grid; 
            grid-template-columns: repeat(7, minmax(0, 1fr)); 
            width: 100%;
            gap: 4px;
            box-sizing: border-box;
        }

        .dot { height: 4px; width: 4px; border-radius: 50%; display: inline-block; margin: 1px; }

        .day-cell {
            aspect-ratio: 1 / 1;
            width: 100%;
            min-width: 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 0.5rem;
            transition: all 0.2s;
            overflow: hidden;
        }

        @media (min-width: 768px) { 
            .day-cell { height: 3.5rem; aspect-ratio: auto; border-radius: 0.75rem; } 
            .calendar-grid { gap: 8px; }
        }

        .hidden-ui { display: none !important; }
        
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        #editModal, #catManagementModal { transition: opacity 0.2s ease; }
        
        input { font-size: 16px !important; }

        /* Color Swatch Styling */
        .color-swatch {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .color-swatch.active {
            border-color: #cbd5e1;
            transform: scale(1.1);
        }

        /* Custom Color Input Styling */
        .custom-picker-wrapper {
            position: relative;
            background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red);
        }
        .custom-picker-wrapper input[type="color"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <!-- Auth Overlay -->
    <div id="authOverlay" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-100 p-4">
        <div class="bg-white w-full max-w-md rounded-3xl p-8 shadow-sm border border-slate-200 text-center">
            <header class="mb-8">
                <h1 class="text-4xl font-bold text-blue-600 mb-2">Tide Tracker</h1>
                <p class="text-slate-500">Made with ❤️ by Appu for Baby</p>
            </header>
            
            <div id="authForm" class="space-y-4 text-left">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Email</label>
                    <input type="email" id="email" placeholder="email@example.com" class="w-full border rounded-xl px-4 py-3 mt-1 outline-none focus:ring-2 focus:ring-blue-400 transition">
                </div>
                
                <div class="relative">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Password</label>
                    <div class="relative mt-1">
                        <input type="password" id="password" placeholder="••••••••" class="w-full border rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-400 transition">
                        <button onclick="togglePasswordVisibility()" class="absolute right-4 top-3.5 text-slate-400">
                            <i id="eyeIcon" class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 pt-2">
                    <button onclick="handleAuth('login')" class="bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-100 transition active:scale-95">Sign In</button>
                    <button onclick="handleAuth('signup')" class="bg-slate-100 text-slate-600 font-bold py-3 rounded-xl hover:bg-slate-200 transition active:scale-95">Sign Up</button>
                </div>

                <div class="flex items-center my-4 text-slate-300 text-[10px] uppercase font-bold tracking-widest">
                    <div class="flex-1 border-t"></div><span class="px-3">Or</span><div class="flex-1 border-t"></div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button onclick="handleGoogleLogin()" class="border border-slate-200 flex items-center justify-center gap-2 py-3 rounded-xl hover:bg-slate-50 transition active:scale-95 font-semibold text-sm">
                        <img src="assets/google.webp" class="w-4 h-4 object-contain" onerror="this.src='https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa_list/google.svg'"> Google
                    </button>
                    <button onclick="handleGuestLogin()" class="bg-slate-800 text-white flex items-center justify-center gap-2 py-3 rounded-xl hover:bg-slate-900 transition active:scale-95 font-semibold text-sm">
                        <i class="fas fa-user-secret"></i> Guest
                    </button>
                </div>
            </div>
            <p id="authError" class="text-red-500 text-xs mt-4 hidden bg-red-50 p-2 rounded-lg"></p>
        </div>
    </div>

    <!-- Edit Entry Modal -->
    <div id="editModal" class="fixed inset-0 z-[60] hidden-ui flex items-center justify-center bg-black/40 backdrop-blur-sm p-4 text-left">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-xl border border-slate-100">
            <h3 class="text-xl font-bold mb-4 text-slate-800">Edit Entry</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Call Title</label>
                    <input type="text" id="modalEditName" class="w-full border rounded-xl px-3 py-2 outline-none focus:ring-2 focus:ring-blue-400 mt-1">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Time</label>
                    <input type="text" id="modalEditTime" class="w-full border rounded-xl px-3 py-2 outline-none focus:ring-2 focus:ring-blue-400 mt-1">
                </div>
                <div class="flex gap-2 pt-2">
                    <button onclick="saveEditFromModal()" class="flex-1 bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition">Save</button>
                    <button onclick="closeEditModal()" class="flex-1 bg-slate-100 text-slate-500 font-bold py-3 rounded-xl hover:bg-slate-200 transition">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Category Management Modal -->
    <div id="catManagementModal" class="fixed inset-0 z-[60] hidden-ui flex items-center justify-center bg-black/40 backdrop-blur-sm p-4 text-left">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-xl border border-slate-100">
            <h3 class="text-xl font-bold mb-4 text-slate-800">Manage Category</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Category Name</label>
                    <input type="text" id="catEditName" class="w-full border rounded-xl px-4 py-2 outline-none focus:ring-2 focus:ring-blue-400 mt-1 text-sm">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Change Color</label>
                    <div class="flex flex-wrap gap-2 mt-2 px-1" id="catEditPalette">
                        <!-- Swatches injected by JS -->
                    </div>
                </div>
                <div class="flex flex-col gap-2 pt-4">
                    <button onclick="saveCatChanges()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition">Save Changes</button>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="deleteSelectedCat()" class="bg-red-50 text-red-600 font-bold py-2 rounded-xl hover:bg-red-100 transition text-sm">Delete</button>
                        <button onclick="closeCatModal()" class="bg-slate-100 text-slate-500 font-bold py-2 rounded-xl hover:bg-slate-200 transition text-sm">Cancel</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="hidden-ui">
        <div class="max-w-6xl mx-auto p-4 md:p-8 pb-20">
            <header class="text-center mb-8 relative">
                <div class="absolute right-0 top-0">
                    <button onclick="handleLogout()" class="text-slate-300 hover:text-red-500 p-2 transition"><i class="fas fa-power-off text-lg"></i></button>
                </div>
                <h1 class="text-3xl md:text-5xl font-bold text-blue-600 mb-1 leading-tight">Sheetu's Tide Tracker</h1>
                <p class="text-xs md:text-base text-slate-500">Made with ❤️ by Appu for Baby <span id="statusTag" class="ml-1 text-[9px] font-bold uppercase px-2 py-0.5 rounded border border-slate-200 bg-white"></span></p>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-12 gap-6 md:gap-8 items-start">
                
                <!-- LEFT: LOGS AREA -->
                <div class="md:col-span-7 space-y-6">
                    <div class="bg-white p-5 md:p-8 rounded-3xl shadow-sm border border-slate-200">
                        <div class="flex flex-col sm:flex-row sm:items-start justify-between gap-4 mb-6">
                            <div class="flex-1">
                                <div class="flex items-center gap-4">
                                    <h3 id="selectedDateTitle" class="text-2xl md:text-3xl font-bold text-blue-600">Today's Log</h3>
                                    <select id="visualizationType" onchange="renderLogs()" class="text-xs bg-slate-50 border border-slate-200 text-slate-500 rounded-lg px-2 py-1 outline-none focus:ring-2 focus:ring-blue-400">
                                        <option value="badges">Badges</option>
                                        <option value="bar">Bar Chart</option>
                                    </select>
                                </div>
                                <div id="dailySummary" class="flex flex-wrap gap-2 mt-3 w-full"></div>
                            </div>
                            <div class="flex flex-wrap gap-2 justify-start sm:justify-end" id="quickLogButtons"></div>
                        </div>
                        <div class="border-t border-slate-50 pt-6">
                            <div id="dailyEntries" class="space-y-4 max-h-[500px] md:max-h-[700px] overflow-y-auto pr-2 custom-scroll">
                                <!-- Entries populated here -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- RIGHT: SIDEBAR -->
                <div class="md:col-span-5 space-y-6">
                    <!-- Calendar Card -->
                    <div class="bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="flex justify-between items-center mb-6">
                            <h2 id="monthDisplay" class="text-xl font-bold text-slate-700"></h2>
                            <div class="flex gap-2">
                                <button onclick="changeMonth(-1)" class="w-8 h-8 flex items-center justify-center bg-slate-50 hover:bg-slate-100 rounded-full transition"><i class="fas fa-chevron-left text-xs"></i></button>
                                <button onclick="changeMonth(1)" class="w-8 h-8 flex items-center justify-center bg-slate-50 hover:bg-slate-100 rounded-full transition"><i class="fas fa-chevron-right text-xs"></i></button>
                            </div>
                        </div>
                        
                        <div class="calendar-grid text-center font-bold text-slate-300 mb-3 uppercase text-[10px] tracking-widest">
                            <div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div>
                        </div>
                        
                        <div id="calendarDays" class="calendar-grid">
                            <!-- Days populated here -->
                        </div>
                    </div>

                    <!-- Categories Card -->
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-bold text-slate-400 text-[10px] uppercase tracking-widest flex items-center gap-2">
                                <i class="fas fa-tags"></i> Categories
                            </h3>
                            <span class="text-[9px] text-slate-300 italic font-bold">Tap a tag to manage</span>
                        </div>
                        <!-- Categories Display & Add Button -->
                        <div id="categoryControls" class="mb-4">
                            <button onclick="toggleAddCategoryForm()" class="w-full bg-slate-100 text-slate-600 border border-slate-200 border-dashed hover:bg-slate-200 transition px-4 py-2 rounded-xl text-[11px] font-bold uppercase tracking-widest flex items-center justify-center gap-2">
                                <i class="fas fa-plus"></i> Add New Category
                            </button>
                        </div>

                        <!-- Add Category Form (Hidden Initially) -->
                        <div id="addCategoryForm" class="space-y-4 hidden-ui bg-slate-50 p-4 rounded-2xl border border-slate-200 mb-4">
                            <div class="flex justify-between items-center mb-2">
                                <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">New Category</h4>
                                <button onclick="toggleAddCategoryForm()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times"></i></button>
                            </div>
                            <div class="flex gap-2">
                                <input type="text" id="catName" placeholder="Category name..." class="flex-1 border rounded-xl px-4 py-2 outline-none focus:ring-2 focus:ring-blue-400 text-sm">
                            </div>
                            
                            <!-- Simple Color Palette with Custom Picker -->
                            <div class="flex flex-wrap gap-2.5 px-1" id="colorPalette">
                                <div class="color-swatch active" style="background: #2563eb" onclick="selectSwatch('#2563eb', this)"></div>
                                <div class="color-swatch" style="background: #ef4444" onclick="selectSwatch('#ef4444', this)"></div>
                                <div class="color-swatch" style="background: #10b981" onclick="selectSwatch('#10b981', this)"></div>
                                <div class="color-swatch" style="background: #f59e0b" onclick="selectSwatch('#f59e0b', this)"></div>
                                <div class="color-swatch" style="background: #ec4899" onclick="selectSwatch('#ec4899', this)"></div>
                                <div class="color-swatch" style="background: #8b5cf6" onclick="selectSwatch('#8b5cf6', this)"></div>
                                <div class="color-swatch" style="background: #0ea5e9" onclick="selectSwatch('#0ea5e9', this)"></div>
                                <div class="color-swatch" style="background: #64748b" onclick="selectSwatch('#64748b', this)"></div>
                                <div class="color-swatch custom-picker-wrapper" id="customSwatch">
                                    <i class="fas fa-plus text-[10px] text-white"></i>
                                    <input type="color" oninput="handleCustomColorChange(this.value, true)" title="Choose custom color">
                                </div>
                            </div>

                            <button onclick="addCategory()" class="w-full bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold text-xs hover:bg-blue-700 transition">Save Category</button>
                        </div>
                        
                        <div id="categoryList" class="flex flex-wrap gap-2 mt-6">
                            <!-- Categories populated here -->
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Script Section -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAcpMXlEUskm5gXDg4JMPOgvQlSrMmrcXg",
            authDomain: "alltracker-aoh.firebaseapp.com",
            projectId: "alltracker-aoh",
            storageBucket: "alltracker-aoh.firebasestorage.app",
            messagingSenderId: "34734519320",
            appId: "1:34734519320:web:db2021161f4eae4ae3ff6d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let isGuest = false;
        let categories = [{ name: 'Call', color: '#2563eb' }];
        let logs = {};
        let selectedDate = new Date().toDateString();
        let currentMonth = new Date();
        let currentEditIndex = null;
        let currentCatEditIndex = null;
        let activeColor = '#2563eb';
        let catEditActiveColor = '#2563eb';

        const paletteColors = ['#2563eb', '#ef4444', '#10b981', '#f59e0b', '#ec4899', '#8b5cf6', '#0ea5e9', '#64748b'];

        // SWATCH HANDLERS
        window.selectSwatch = (color, el) => {
            activeColor = color;
            document.querySelectorAll('#colorPalette .color-swatch').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
        };

        window.selectCatEditSwatch = (color, el) => {
            catEditActiveColor = color;
            document.querySelectorAll('#catEditPalette .color-swatch').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
        };

        window.handleCustomColorChange = (color, isNewCategory) => {
            if (isNewCategory) {
                activeColor = color;
                const customSwatch = document.getElementById('customSwatch');
                customSwatch.style.background = color;
                window.selectSwatch(color, customSwatch);
            } else {
                catEditActiveColor = color;
                const customEditSwatch = document.getElementById('catEditCustomSwatch');
                customEditSwatch.style.background = color;
                window.selectCatEditSwatch(color, customEditSwatch);
            }
        };

        // AUTH HANDLERS
        window.handleGuestLogin = () => {
            isGuest = true;
            localStorage.setItem('tide_session_type', 'guest');
            currentUser = { uid: 'guest' };
            const saved = JSON.parse(localStorage.getItem('tide_guest_data')) || { categories: [{ name: 'Call', color: '#2563eb' }], logs: {} };
            categories = saved.categories;
            logs = saved.logs;
            enterApp();
        };

        window.handleAuth = async (type) => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(!email || !password) return showError("Please fill in both fields.");
            try {
                localStorage.setItem('tide_session_type', 'firebase'); 
                if (type === 'login') await signInWithEmailAndPassword(auth, email, password);
                else await createUserWithEmailAndPassword(auth, email, password);
            } catch (err) { showError(err.message); }
        };

        window.handleGoogleLogin = () => {
            localStorage.setItem('tide_session_type', 'firebase');
            signInWithPopup(auth, provider).catch(e => showError(e.message));
        };
        
        window.handleLogout = () => {
            localStorage.removeItem('tide_session_type');
            if(isGuest) {
                isGuest = false;
                location.reload();
            } else {
                signOut(auth);
            }
        };

        window.togglePasswordVisibility = () => {
            const passInput = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (passInput.type === "password") {
                passInput.type = "text";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passInput.type = "password";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        };

        function showError(msg) {
            const err = document.getElementById('authError');
            err.innerText = msg;
            err.classList.remove('hidden');
            setTimeout(() => err.classList.add('hidden'), 5000);
        }

        // INITIALIZE APP
        const initSession = () => {
            const sessionType = localStorage.getItem('tide_session_type');
            
            onAuthStateChanged(auth, (user) => {
                if (user && !isGuest) {
                    currentUser = user;
                    localStorage.setItem('tide_session_type', 'firebase');
                    onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            categories = data.categories || categories;
                            logs = data.logs || {};
                            enterApp();
                        } else {
                            saveData();
                            enterApp();
                        }
                    }, (err) => console.error("Snapshot error:", err));
                } else if (sessionType === 'guest') {
                    handleGuestLogin();
                } else {
                    document.getElementById('authOverlay').classList.remove('hidden-ui');
                    document.getElementById('mainApp').classList.add('hidden-ui');
                }
            });
        };

        async function saveData() {
            if (!currentUser) return;
            if (isGuest) {
                localStorage.setItem('tide_guest_data', JSON.stringify({ categories, logs }));
            } else {
                await setDoc(doc(db, "users", currentUser.uid), { categories, logs });
            }
            renderAll();
        }

        function enterApp() {
            document.getElementById('authOverlay').classList.add('hidden-ui');
            document.getElementById('mainApp').classList.remove('hidden-ui');
            document.getElementById('statusTag').innerText = isGuest ? 'Guest Mode' : 'Cloud Sync';
            renderAll();
        }

        // APP LOGIC
        window.renderAll = () => {
            renderCalendar();
            renderCategories();
            renderLogs();
        };

        window.renderCalendar = () => {
            const grid = document.getElementById('calendarDays');
            const display = document.getElementById('monthDisplay');
            grid.innerHTML = '';
            
            const first = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), 1);
            const last = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 0);
            
            display.innerText = first.toLocaleString('default', { month: 'long', year: 'numeric' });

            for (let i = 0; i < first.getDay(); i++) {
                grid.innerHTML += `<div></div>`;
            }

            for (let d = 1; d <= last.getDate(); d++) {
                const dateStr = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), d).toDateString();
                const daily = logs[dateStr] || [];
                const isSelected = dateStr === selectedDate;
                const isToday = dateStr === new Date().toDateString();
                const dots = daily.slice(0, 5).map(l => `<span class="dot" style="background:${l.color}"></span>`).join('');

                grid.innerHTML += `
                    <div onclick="selectDate('${dateStr}')" 
                         class="day-cell border cursor-pointer transition 
                         ${isSelected ? 'border-blue-600 bg-blue-50 ring-2 ring-blue-100 z-10 shadow-sm' : 'bg-white border-slate-50 hover:bg-slate-50'}">
                        <span class="text-[10px] md:text-sm ${isSelected ? 'font-bold text-blue-600' : ''} ${isToday && !isSelected ? 'text-blue-400 font-bold underline' : ''}">${d}</span>
                        <div class="flex flex-wrap justify-center px-0.5 mt-0.5">${dots}</div>
                    </div>`;
            }
        };

        window.selectDate = (date) => {
            selectedDate = date;
            renderAll();
        };

        window.changeMonth = (dir) => {
            currentMonth.setMonth(currentMonth.getMonth() + dir);
            renderCalendar();
        };

        window.toggleAddCategoryForm = () => {
            const form = document.getElementById('addCategoryForm');
            const controls = document.getElementById('categoryControls');
            if (form.classList.contains('hidden-ui')) {
                form.classList.remove('hidden-ui');
                controls.classList.add('hidden-ui');
            } else {
                form.classList.add('hidden-ui');
                controls.classList.remove('hidden-ui');
            }
        };

        window.addCategory = () => {
            const name = document.getElementById('catName').value;
            if (name) {
                categories.push({ name, color: activeColor });
                document.getElementById('catName').value = '';
                saveData();
                toggleAddCategoryForm();
            }
        };

        // CATEGORY MANAGEMENT
        window.openCatModal = (idx) => {
            currentCatEditIndex = idx;
            const cat = categories[idx];
            catEditActiveColor = cat.color;
            document.getElementById('catEditName').value = cat.name;
            
            const palette = document.getElementById('catEditPalette');
            palette.innerHTML = paletteColors.map(color => `
                <div class="color-swatch ${color === cat.color ? 'active' : ''}" 
                     style="background: ${color}" 
                     onclick="selectCatEditSwatch('${color}', this)"></div>
            `).join('') + `
                <div class="color-swatch custom-picker-wrapper ${!paletteColors.includes(cat.color) ? 'active' : ''}" 
                     id="catEditCustomSwatch"
                     style="background: ${!paletteColors.includes(cat.color) ? cat.color : ''}">
                    <i class="fas fa-plus text-[10px] text-white"></i>
                    <input type="color" value="${cat.color}" oninput="handleCustomColorChange(this.value, false)">
                </div>
            `;
            
            document.getElementById('catManagementModal').classList.remove('hidden-ui');
        };

        window.closeCatModal = () => {
            document.getElementById('catManagementModal').classList.add('hidden-ui');
            currentCatEditIndex = null;
        };

        window.saveCatChanges = () => {
            if (currentCatEditIndex !== null) {
                categories[currentCatEditIndex].name = document.getElementById('catEditName').value;
                categories[currentCatEditIndex].color = catEditActiveColor;
                saveData();
                closeCatModal();
            }
        };

        window.deleteSelectedCat = () => {
            if (currentCatEditIndex !== null) {
                if(confirm(`Delete "${categories[currentCatEditIndex].name}"? This won't delete previous logs but will remove the quick-log button.`)) {
                    categories.splice(currentCatEditIndex, 1);
                    saveData();
                    closeCatModal();
                }
            }
        };

        window.renderCategories = () => {
            const list = document.getElementById('categoryList');
            const buttons = document.getElementById('quickLogButtons');
            list.innerHTML = ''; buttons.innerHTML = '';
            
            categories.forEach((cat, idx) => {
                list.innerHTML += `
                    <span class="px-3 py-1 rounded-full text-[10px] font-bold text-white cursor-pointer shadow-sm hover:brightness-95 active:scale-95 transition" 
                          style="background:${cat.color}"
                          onclick="openCatModal(${idx})">
                        ${cat.name}
                    </span>`;
                
                buttons.innerHTML += `
                    <button onclick="logCall('${cat.name}', '${cat.color}')" 
                            class="px-4 py-2 rounded-full border-l-4 transition hover:bg-slate-50 hover:shadow-md text-[11px] font-bold active:scale-95" 
                            style="border-color:${cat.color}; background: ${cat.color}15">
                        + ${cat.name}
                    </button>`;
            });
        };

        window.logCall = (name, color) => {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            if (!logs[selectedDate]) logs[selectedDate] = [];
            logs[selectedDate].unshift({ name, color, time });
            saveData();
        };

        window.renderLogs = () => {
            const container = document.getElementById('dailyEntries');
            const summaryContainer = document.getElementById('dailySummary');
            document.getElementById('selectedDateTitle').innerText = selectedDate === new Date().toDateString() ? "Today's Log" : selectedDate;
            const daily = logs[selectedDate] || [];
            
            if (daily.length === 0) {
                summaryContainer.innerHTML = '';
                container.innerHTML = `<p class="text-slate-300 text-sm italic text-center py-20">No activity logged for this date.</p>`;
                return;
            }

            // Calculate Summary
            const summaryCounts = {};
            const summaryColors = {};
            let totalLogs = 0;

            daily.forEach(l => {
                if (!summaryCounts[l.name]) {
                    summaryCounts[l.name] = 0;
                    summaryColors[l.name] = l.color;
                }
                summaryCounts[l.name]++;
                totalLogs++;
            });

            // Render Summary
            const vizType = document.getElementById('visualizationType').value;
            let summaryHTML = '';

            if (vizType === 'bar') {
                // Stacked Bar Chart Visualization
                summaryHTML += `
                    <div class="flex items-center gap-2 mb-1">
                        <span class="text-xs font-bold text-slate-600">Total: ${totalLogs}</span>
                    </div>
                    <div class="w-full flex h-6 rounded-lg overflow-hidden border border-slate-200">
                `;
                for (const [name, count] of Object.entries(summaryCounts)) {
                    const color = summaryColors[name];
                    const percentage = (count / totalLogs) * 100;
                    summaryHTML += `
                        <div style="width: ${percentage}%; background: ${color};"
                             class="h-full flex items-center justify-center relative group transition hover:opacity-90 cursor-default">
                             <div class="absolute bottom-full mb-1 hidden group-hover:block whitespace-nowrap bg-slate-800 text-white text-[10px] font-bold py-0.5 px-2 rounded z-20">
                                ${name}: ${count} (${Math.round(percentage)}%)
                             </div>
                        </div>
                    `;
                }
                summaryHTML += `</div>`;

                // Legend
                summaryHTML += `<div class="flex flex-wrap gap-3 mt-2 w-full">`;
                for (const [name, count] of Object.entries(summaryCounts)) {
                    const color = summaryColors[name];
                    summaryHTML += `
                        <div class="flex items-center gap-1.5">
                            <span class="w-2 h-2 rounded-full" style="background: ${color}"></span>
                            <span class="text-[10px] font-bold text-slate-500">${name} (${count})</span>
                        </div>
                    `;
                }
                summaryHTML += `</div>`;

            } else {
                // Default Badges Visualization
                summaryHTML += `
                    <span class="px-2.5 py-1 rounded-lg text-[11px] font-bold bg-slate-100 text-slate-600 border border-slate-200">
                        Total: ${totalLogs}
                    </span>`;
                for (const [name, count] of Object.entries(summaryCounts)) {
                    const color = summaryColors[name];
                    summaryHTML += `
                        <span class="px-2.5 py-1 rounded-lg text-[11px] font-bold border"
                              style="background: ${color}15; color: ${color}; border-color: ${color}40;">
                            ${name}: ${count}
                        </span>`;
                }
            }
            summaryContainer.innerHTML = summaryHTML;

            container.innerHTML = daily.map((l, i) => `
                <div class="flex items-center justify-between bg-white p-4 rounded-2xl border border-slate-100 group transition hover:border-blue-200">
                    <div class="flex items-center gap-4 min-w-0 flex-1 text-left">
                        <div class="w-1.5 h-10 rounded-full" style="background:${l.color}"></div>
                        <div class="min-w-0">
                            <div class="flex items-center gap-2">
                                <p class="font-bold text-sm md:text-lg text-slate-700 truncate">${l.name}</p>
                                <button onclick="openEditModal(${i})" class="text-[10px] font-bold text-blue-400 hover:underline">edit</button>
                            </div>
                            <p class="text-[10px] md:text-xs text-slate-400 font-bold uppercase tracking-widest">${l.time}</p>
                        </div>
                    </div>
                    <button onclick="deleteEntry(${i})" class="text-slate-200 hover:text-red-500 transition-colors p-2"><i class="fas fa-trash-can text-lg"></i></button>
                </div>
            `).join('');
        };

        window.openEditModal = (i) => {
            currentEditIndex = i;
            const entry = logs[selectedDate][i];
            document.getElementById('modalEditName').value = entry.name;
            document.getElementById('modalEditTime').value = entry.time;
            document.getElementById('editModal').classList.remove('hidden-ui');
        };

        window.closeEditModal = () => {
            document.getElementById('editModal').classList.add('hidden-ui');
            currentEditIndex = null;
        };

        window.saveEditFromModal = () => {
            if (currentEditIndex !== null) {
                logs[selectedDate][currentEditIndex].name = document.getElementById('modalEditName').value;
                logs[selectedDate][currentEditIndex].time = document.getElementById('modalEditTime').value;
                saveData();
                closeEditModal();
            }
        };

        window.deleteEntry = (i) => {
            if(confirm("Delete this log entry?")) {
                logs[selectedDate].splice(i, 1);
                saveData();
            }
        };

        window.handleForgotPassword = () => {
            const email = document.getElementById('email').value;
            if(!email) return showError("Please enter your email address first.");
            sendPasswordResetEmail(auth, email)
                .then(() => alert("Password reset email sent!"))
                .catch((error) => showError(error.message));
        };

        // Start App
        initSession();

    </script>
</body>
</html>
