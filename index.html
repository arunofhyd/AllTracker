<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sheetu's Tide Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'League Spartan', sans-serif; -webkit-tap-highlight-color: transparent; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); width: 100%; }
        .dot { height: 5px; width: 5px; border-radius: 50%; display: inline-block; margin: 1px; }
        .day-cell { aspect-ratio: 1 / 1; min-height: 40px; }
        @media (min-width: 768px) { .day-cell { height: 3.5rem; aspect-ratio: auto; } }
        .hidden-ui { display: none !important; }
        #editModal { transition: opacity 0.2s ease; }
        /* Custom scrollbar for a cleaner look */
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <div id="authOverlay" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-100 p-4">
        <div class="bg-white w-full max-w-md rounded-2xl p-8 shadow-sm border border-slate-200 text-center">
            <header class="mb-8">
                <h1 class="text-4xl font-bold text-indigo-600 mb-2">Tide Tracker</h1>
                <p class="text-slate-500">Made with ❤️ by Appu for Baby</p>
            </header>
            <div id="authForm" class="space-y-4 text-left">
                <input type="email" id="email" placeholder="Email" class="w-full border rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-400">
                <div class="relative">
                    <input type="password" id="password" placeholder="Password" class="w-full border rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-400">
                    <button onclick="togglePassword()" class="absolute right-4 top-3.5 text-slate-400"><i id="eyeIcon" class="fas fa-eye"></i></button>
                </div>
                <div class="grid grid-cols-2 gap-3 pt-2">
                    <button onclick="handleAuth('login')" class="bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition">Sign In</button>
                    <button onclick="handleAuth('signup')" class="bg-slate-200 text-slate-700 font-bold py-3 rounded-lg hover:bg-slate-300 transition">Sign Up</button>
                </div>
                <div class="flex items-center my-4 text-slate-300 text-xs uppercase font-bold tracking-widest"><div class="flex-1 border-t"></div><span class="px-3">Or</span><div class="flex-1 border-t"></div></div>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="handleGoogleLogin()" class="border border-slate-200 flex items-center justify-center gap-2 py-3 rounded-lg hover:bg-slate-50 transition font-semibold text-sm"><img src="assets/google.webp" class="w-4 h-4 object-contain"> Google</button>
                    <button onclick="handleGuestLogin()" class="bg-slate-800 text-white flex items-center justify-center gap-2 py-3 rounded-lg hover:bg-slate-900 transition font-semibold text-sm"><i class="fas fa-user-secret"></i> Guest</button>
                </div>
            </div>
        </div>
    </div>

    <div id="editModal" class="fixed inset-0 z-[60] hidden flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl p-6 shadow-xl">
            <h3 class="text-xl font-bold mb-4">Edit Entry</h3>
            <div class="space-y-4">
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">Call Title</label><input type="text" id="modalEditName" class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-400 mt-1"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">Time</label><input type="text" id="modalEditTime" class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-400 mt-1"></div>
                <div class="flex gap-2 pt-2">
                    <button onclick="saveEditFromModal()" class="flex-1 bg-indigo-600 text-white font-bold py-2 rounded-lg">Save</button>
                    <button onclick="closeEditModal()" class="flex-1 bg-slate-100 text-slate-500 font-bold py-2 rounded-lg">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden-ui">
        <div class="max-w-6xl mx-auto p-4 md:p-8 pb-20">
            <header class="text-center mb-8 relative">
                <div class="absolute right-0 top-0"><button onclick="handleLogout()" class="text-slate-300 hover:text-red-500 p-2"><i class="fas fa-power-off"></i></button></div>
                <h1 class="text-3xl md:text-5xl font-bold text-indigo-600 mb-1">Sheetu's Tide Tracker</h1>
                <p class="text-xs md:text-base text-slate-500">Made with ❤️ by Appu for Baby <span id="statusTag" class="ml-2 text-[10px] font-bold uppercase px-2 py-0.5 rounded border border-slate-200"></span></p>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-12 gap-8 items-start">
                
                <div class="md:col-span-7 space-y-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                            <h3 id="selectedDateTitle" class="text-2xl font-bold text-indigo-500">Today's Log</h3>
                            <div class="flex flex-wrap gap-2" id="quickLogButtons"></div>
                        </div>
                        <div class="border-t pt-4">
                            <div id="dailyEntries" class="space-y-3 max-h-[600px] overflow-y-auto pr-2 custom-scroll"></div>
                        </div>
                    </div>
                </div>

                <div class="md:col-span-5 space-y-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <div class="flex justify-between items-center mb-4">
                            <h2 id="monthDisplay" class="text-xl font-semibold"></h2>
                            <div class="flex gap-1">
                                <button onclick="changeMonth(-1)" class="w-8 h-8 flex items-center justify-center hover:bg-slate-100 rounded-full transition"><i class="fas fa-chevron-left text-xs"></i></button>
                                <button onclick="changeMonth(1)" class="w-8 h-8 flex items-center justify-center hover:bg-slate-100 rounded-full transition"><i class="fas fa-chevron-right text-xs"></i></button>
                            </div>
                        </div>
                        <div class="calendar-grid text-center font-bold text-slate-400 mb-2 uppercase text-[10px] tracking-widest">
                            <div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div>
                        </div>
                        <div id="calendarDays" class="calendar-grid gap-1.5"></div>
                    </div>

                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <h3 class="font-bold mb-4 text-slate-500 text-sm flex items-center gap-2"><i class="fas fa-tags"></i> Call Types</h3>
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="catName" placeholder="New Label" class="flex-1 border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-400 text-sm">
                            <input type="color" id="catColor" value="#6366f1" class="h-10 w-10 border rounded-lg p-1 bg-white cursor-pointer">
                            <button onclick="addCategory()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold text-xs">Add</button>
                        </div>
                        <div id="categoryList" class="flex flex-wrap gap-2"></div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAcpMXlEUskm5gXDg4JMPOgvQlSrMmrcXg",
            authDomain: "alltracker-aoh.firebaseapp.com",
            projectId: "alltracker-aoh",
            storageBucket: "alltracker-aoh.firebasestorage.app",
            messagingSenderId: "34734519320",
            appId: "1:34734519320:web:db2021161f4eae4ae3ff6d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null, isGuest = false, logs = {}, selectedDate = new Date().toDateString(), currentMonth = new Date(), currentEditIndex = null;
        let categories = [{ name: 'Urgent', color: '#ef4444' }, { name: 'Follow-up', color: '#3b82f6' }];

        window.handleGuestLogin = () => {
            isGuest = true; currentUser = { uid: 'guest' };
            const saved = JSON.parse(localStorage.getItem('tide_guest_data')) || { categories, logs: {} };
            categories = saved.categories; logs = saved.logs; enterUI();
        };

        window.handleAuth = async (t) => {
            const e = document.getElementById('email').value, p = document.getElementById('password').value;
            try { t === 'login' ? await signInWithEmailAndPassword(auth, e, p) : await createUserWithEmailAndPassword(auth, e, p); } catch (err) { showError(err.message); }
        };

        window.handleGoogleLogin = () => signInWithPopup(auth, provider).catch(e => showError(e.message));
        window.handleLogout = () => isGuest ? location.reload() : signOut(auth);
        
        onAuthStateChanged(auth, (user) => {
            if (user && !isGuest) {
                currentUser = user;
                onSnapshot(doc(db, "users", user.uid), (doc) => {
                    if (doc.exists()) { categories = doc.data().categories || categories; logs = doc.data().logs || {}; enterUI(); } else save();
                });
            } else if (!isGuest) {
                document.getElementById('authOverlay').classList.remove('hidden-ui');
                document.getElementById('mainApp').classList.add('hidden-ui');
            }
        });

        async function save() {
            if (!currentUser) return;
            if (isGuest) localStorage.setItem('tide_guest_data', JSON.stringify({ categories, logs }));
            else await setDoc(doc(db, "users", currentUser.uid), { categories, logs });
            renderAll();
        }

        function enterUI() {
            document.getElementById('authOverlay').classList.add('hidden-ui');
            document.getElementById('mainApp').classList.remove('hidden-ui');
            document.getElementById('statusTag').innerText = isGuest ? 'Guest' : 'Cloud';
            renderAll();
        }

        window.renderAll = () => { renderCalendar(); renderCategories(); renderLogs(); };

        window.renderCalendar = () => {
            const grid = document.getElementById('calendarDays'), display = document.getElementById('monthDisplay');
            grid.innerHTML = '';
            const first = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), 1);
            const last = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 0);
            display.innerText = first.toLocaleString('default', { month: 'long', year: 'numeric' });
            for (let i = 0; i < first.getDay(); i++) grid.innerHTML += `<div></div>`;
            for (let d = 1; d <= last.getDate(); d++) {
                const dateStr = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), d).toDateString();
                const daily = logs[dateStr] || [], isSel = dateStr === selectedDate;
                const dots = daily.slice(0, 5).map(l => `<span class="dot" style="background:${l.color}"></span>`).join('');
                grid.innerHTML += `
                    <div onclick="selectDate('${dateStr}')" class="day-cell border rounded-lg flex flex-col items-center justify-center cursor-pointer transition 
                         ${isSel ? 'border-indigo-500 bg-indigo-50 ring-2 ring-indigo-100' : 'hover:bg-slate-50 border-slate-100'}">
                        <span class="text-[10px] md:text-sm ${isSel ? 'font-bold text-indigo-600' : ''}">${d}</span>
                        <div class="flex flex-wrap justify-center px-0.5">${dots}</div>
                    </div>`;
            }
        };

        window.selectDate = (date) => { selectedDate = date; document.getElementById('selectedDateTitle').innerText = date === new Date().toDateString() ? "Today's Log" : date; renderAll(); };
        window.changeMonth = (dir) => { currentMonth.setMonth(currentMonth.getMonth() + dir); renderCalendar(); };
        
        window.renderCategories = () => {
            const list = document.getElementById('categoryList'), buttons = document.getElementById('quickLogButtons');
            list.innerHTML = ''; buttons.innerHTML = '';
            categories.forEach((cat, idx) => {
                list.innerHTML += `<span class="px-3 py-1 rounded-full text-[10px] font-bold text-white flex items-center gap-2" style="background:${cat.color}">${cat.name}<button onclick="removeCat(${idx})"><i class="fas fa-times"></i></button></span>`;
                buttons.innerHTML += `<button onclick="logCall('${cat.name}', '${cat.color}')" class="px-4 py-2 rounded-full border-l-4 transition hover:shadow-sm text-[11px] font-bold" style="border-color:${cat.color}; background: ${cat.color}15">+ ${cat.name}</button>`;
            });
        };

        window.addCategory = () => {
            const n = document.getElementById('catName').value, c = document.getElementById('catColor').value;
            if (n) { categories.push({ name: n, color: c }); document.getElementById('catName').value = ''; save(); }
        };

        window.logCall = (name, color) => {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            if (!logs[selectedDate]) logs[selectedDate] = [];
            logs[selectedDate].unshift({ name, color, time });
            save();
        };

        window.renderLogs = () => {
            const container = document.getElementById('dailyEntries'), daily = logs[selectedDate] || [];
            container.innerHTML = daily.length ? daily.map((l, i) => `
                <div class="flex items-center justify-between bg-white p-4 rounded-xl border border-slate-100 group gap-4 transition hover:border-indigo-200">
                    <div class="min-w-0 flex-1 flex items-center gap-4">
                        <div class="w-1 h-8 rounded-full" style="background:${l.color}"></div>
                        <div>
                            <div class="flex items-center gap-2">
                                <p class="font-bold text-sm md:text-base text-slate-700 truncate">${l.name}</p>
                                <button onclick="openEditModal(${i})" class="text-[10px] text-indigo-400 hover:underline">edit</button>
                            </div>
                            <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">${l.time}</p>
                        </div>
                    </div>
                    <button onclick="deleteEntry(${i})" class="text-slate-300 hover:text-red-500 transition-colors p-2"><i class="fas fa-trash-alt text-lg"></i></button>
                </div>`).join('') : `<p class="text-slate-400 text-sm italic text-center py-10">No calls tracked for this date.</p>`;
        };

        window.openEditModal = (i) => {
            currentEditIndex = i; const entry = logs[selectedDate][i];
            document.getElementById('modalEditName').value = entry.name;
            document.getElementById('modalEditTime').value = entry.time;
            document.getElementById('editModal').classList.remove('hidden');
        };
        window.closeEditModal = () => { document.getElementById('editModal').classList.add('hidden'); currentEditIndex = null; };
        window.saveEditFromModal = () => { if (currentEditIndex !== null) { logs[selectedDate][currentEditIndex].name = document.getElementById('modalEditName').value; logs[selectedDate][currentEditIndex].time = document.getElementById('modalEditTime').value; save(); closeEditModal(); } };
        window.deleteEntry = (i) => { if(confirm("Delete this log?")) { logs[selectedDate].splice(i,1); save(); } };
        window.removeCat = (i) => { categories.splice(i,1); save(); };
        window.togglePassword = () => { const p = document.getElementById('password'), i = document.getElementById('eyeIcon'); p.type = p.type === 'password' ? 'text' : 'password'; i.className = p.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash'; };
        function showError(m) { const e = document.getElementById('authError'); e.innerText = m; e.classList.remove('hidden'); }
    </script>
</body>
</html>
